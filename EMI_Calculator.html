<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkSocial India | EMI Calculator</title>
  <meta name="description" content="Calculate EMI for Home, Car & Personal Loans. Trusted by Indian Bankers. Built by WorkSocial India.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.worksocial.org/emi-calculator">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>
    body {
      font-family: 'Lato', sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #004085;
      color: #fff;
      padding: 1rem 0;
      text-align: center;
    }
    .container {
      margin-top: 2rem;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .result-box {
      background: #e9ecef;
      padding: 1rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>WorkSocial India – EMI Calculator</h1>
  <p>Smart Financial Planning Starts Here</p>
</header>

<main class="container">
  <div class="card p-4">
    <form id="emiForm">
      <div class="mb-3">
        <label for="loanAmount" class="form-label">Loan Amount (₹)</label>
        <input type="number" id="loanAmount" class="form-control" required placeholder="e.g. 2500000">
      </div>

      <div class="mb-3">
        <label for="interestRate" class="form-label">Interest Rate (%)</label>
        <input type="number" step="0.01" id="interestRate" class="form-control" required placeholder="e.g. 9.5">
      </div>

      <div class="mb-3">
        <label for="loanTenure" class="form-label">Loan Tenure (Years)</label>
        <input type="number" id="loanTenure" class="form-control" required placeholder="e.g. 20">
      </div>

      <button type="submit" class="btn btn-primary w-100">Calculate EMI</button>
    </form>

    <div id="result" class="result-box mt-4 d-none">
      <h5>Monthly EMI: ₹<span id="emiAmount">0</span></h5>
      <p>Total Interest Payable: ₹<span id="totalInterest">0</span></p>
      <p>Total Payment (Principal + Interest): ₹<span id="totalPayment">0</span></p>
    </div>
  </div>
</main>

<footer class="text-center mt-5 mb-4 text-muted">
  &copy; 2025 WorkSocial India. All Rights Reserved. | <a href="https://www.worksocial.org">www.worksocial.org</a>
</footer>

<!-- Scripts -->
<script>
  document.getElementById('emiForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const P = parseFloat(document.getElementById('loanAmount').value);
    const R = parseFloat(document.getElementById('interestRate').value) / 12 / 100;
    const N = parseFloat(document.getElementById('loanTenure').value) * 12;

    const EMI = P * R * Math.pow(1 + R, N) / (Math.pow(1 + R, N) - 1);
    const totalPayment = EMI * N;
    const totalInterest = totalPayment - P;

    document.getElementById('emiAmount').innerText = EMI.toFixed(2);
    document.getElementById('totalInterest').innerText = totalInterest.toFixed(2);
    document.getElementById('totalPayment').innerText = totalPayment.toFixed(2);
    document.getElementById('result').classList.remove('d-none');
  });
</script>

</body>
</html>
