<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkSocial India | Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <style>
    body {
      font-family: 'Lato', sans-serif;
      background-color: #f8f9fa;
      margin: 0;
    }
    header {
      background-color: #004085;
      color: #fff;
      padding: 1rem 0;
      text-align: center;
    }
    .game-container {
      text-align: center;
      margin-top: 2rem;
    }
    #man-svg {
      width: 200px;
      height: 200px;
    }
    #message {
      font-size: 1.2rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<header>
  <h1>Welcome to WorkSocial India</h1>
  <p>Your Partner in Financial Well-being</p>
</header>
<main class="container game-container">
  <h2>Stop the Hand Game</h2>
  <p>Press the spacebar to stop the man's rotating hand when it points to the right.</p>
  <svg id="man-svg" viewBox="0 0 200 200">
    <circle cx="100" cy="40" r="20" stroke="black" stroke-width="4" fill="none" />
    <line x1="100" y1="60" x2="100" y2="120" stroke="black" stroke-width="4" />
    <line x1="100" y1="80" x2="60" y2="110" stroke="black" stroke-width="4" />
    <g id="right-arm">
      <line x1="100" y1="80" x2="140" y2="110" stroke="black" stroke-width="4" />
    </g>
  </svg>
  <div id="message"></div>
</main>
<script>
  const arm = document.getElementById('right-arm');
  const message = document.getElementById('message');
  let angle = 0;
  let rotating = true;
  const speed = 2; // degrees per frame
  const tolerance = 10; // acceptable degrees from 0
  function animate() {
    if (rotating) {
      angle = (angle + speed) % 360;
      arm.setAttribute('transform', `rotate(${angle} 100 80)`);
    }
    requestAnimationFrame(animate);
  }
  animate();
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      rotating = !rotating;
      if (!rotating) {
        const normalized = angle % 360;
        if (normalized < tolerance || normalized > 360 - tolerance) {
          message.textContent = 'Great job!';
        } else {
          message.textContent = 'Try again!';
        }
      } else {
        message.textContent = '';
      }
    }
  });
</script>
</body>
</html>
